<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Govt Job Tracker</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500&display=swap');
:root{--bg:#f8f8f8;--bg2:#f1f1f1;--surface:#fff;--border:#e2e2e2;--border2:#d0d0d0;--text:#111;--text2:#555;--muted:#999;--accent:#0052cc;--accent-bg:#e8f0ff;--open:#16a34a;--open-bg:#dcfce7;--closed:#dc2626;--closed-bg:#fee2e2;--upcoming:#d97706;--upcoming-bg:#fef3c7;--check:#2563eb;--check-bg:#dbeafe;--yes:#16a34a;--yes-bg:#dcfce7;--no:#dc2626;--no-bg:#fee2e2;--maybe:#d97706;--maybe-bg:#fef3c7;--r:4px;--font:'Geist',sans-serif;--mono:'Geist Mono',monospace}
[data-theme=dark]{--bg:#0c0c0c;--bg2:#151515;--surface:#1c1c1c;--border:#262626;--border2:#343434;--text:#efefef;--text2:#aaa;--muted:#666;--accent:#4d9fff;--accent-bg:#0d1f3c;--open:#4ade80;--open-bg:#052e16;--closed:#f87171;--closed-bg:#450a0a;--upcoming:#fbbf24;--upcoming-bg:#431407;--check:#60a5fa;--check-bg:#0c1a3a;--yes:#4ade80;--yes-bg:#052e16;--no:#f87171;--no-bg:#450a0a;--maybe:#fbbf24;--maybe-bg:#431407}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5;min-height:100vh}

/* AUTH */
#authScreen{display:none;position:fixed;inset:0;background:var(--bg);z-index:1000;align-items:center;justify-content:center;padding:20px}
#authScreen.show{display:flex}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:36px 32px;width:100%;max-width:380px}
.auth-logo{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.06em;margin-bottom:4px}
.auth-logo span{color:var(--accent)}
.auth-sub{font-size:12px;color:var(--muted);margin-bottom:24px}
.auth-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:22px}
.auth-tab{flex:1;height:34px;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:var(--mono);font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .12s}
.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.auth-form{display:none;flex-direction:column;gap:14px}
.auth-form.show{display:flex}
.af{display:flex;flex-direction:column;gap:4px}
.af label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.af input{height:36px;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:0 10px;border-radius:var(--r);outline:none;transition:border-color .12s}
.af input:focus{border-color:var(--accent)}
.auth-err{font-family:var(--mono);font-size:11px;color:var(--closed);background:var(--closed-bg);padding:8px 10px;border-radius:var(--r);display:none}
.auth-err.show{display:block}
.auth-ok{font-family:var(--mono);font-size:11px;color:var(--open);background:var(--open-bg);padding:8px 10px;border-radius:var(--r);display:none}
.auth-ok.show{display:block}
.auth-lnk{font-family:var(--mono);font-size:10px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;text-align:left}
.auth-lnk:hover{text-decoration:underline}

/* APP */
#app{display:none}
#app.show{display:block}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:200;gap:12px}
.logo{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.06em;white-space:nowrap}
.logo span{color:var(--accent)}
.topbar-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ts{font-family:var(--mono);font-size:10px;color:var(--muted)}
.user-chip{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--text2);background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--open);flex-shrink:0;transition:background .3s}
.sdot.saving{background:var(--upcoming);animation:pulse 1s infinite}
.sdot.err{background:var(--closed)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* CONTROLS */
.controls{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:9px 20px;border-bottom:1px solid var(--border);background:var(--bg2)}
input[type=text],select{height:29px;background:var(--surface);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:11px;padding:0 9px;outline:none;border-radius:var(--r);transition:border-color .12s;cursor:pointer}
input[type=text]{min-width:160px}
input[type=text]:focus,select:focus{border-color:var(--accent)}
input[type=text]::placeholder{color:var(--muted)}
.btn{height:29px;padding:0 11px;font-family:var(--mono);font-size:11px;font-weight:500;border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;border-radius:var(--r);transition:all .12s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{opacity:.88}
.btn.ghost{border-color:transparent;color:var(--muted);background:transparent}
.btn.ghost:hover{color:var(--text);border-color:var(--border2)}
.btn.danger{border-color:var(--closed);color:var(--closed);background:transparent}
.btn.danger:hover{background:var(--closed-bg)}

/* STATS */
.stats{display:flex;border-bottom:1px solid var(--border);background:var(--surface)}
.stat{flex:1;padding:11px 14px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.sn{font-family:var(--mono);font-size:19px;font-weight:600;display:block}
.sl{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{padding:8px 12px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:left;white-space:nowrap;border-bottom:1px solid var(--border);background:var(--bg2);cursor:pointer;user-select:none}
thead th:hover{color:var(--text)}
thead th.asc::after{content:' ↑';color:var(--accent)}
thead th.desc::after{content:' ↓';color:var(--accent)}
tbody tr.main-row{border-bottom:1px solid var(--border);transition:background .07s;cursor:pointer}
tbody tr.main-row:hover{background:var(--bg2)}
tbody tr.main-row.app-row{background:var(--yes-bg)}
tbody tr.main-row.expanded{background:var(--accent-bg);border-bottom:none}
[data-theme=dark] tbody tr.main-row.expanded{background:var(--bg2)}
td{padding:9px 12px;vertical-align:middle;font-size:12px}
.xarr{width:28px;padding:9px 4px 9px 12px;text-align:center}
.arr{display:inline-block;font-size:11px;color:var(--muted);transition:transform .18s}
.expanded .arr{transform:rotate(90deg);color:var(--accent)}
tr.exp-row{display:none}
tr.exp-row.open{display:table-row}
.exp-inner{padding:10px 12px 14px 52px;background:var(--accent-bg);border-bottom:1px solid var(--border)}
[data-theme=dark] .exp-inner{background:var(--bg2)}
.exp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px 20px;margin-bottom:12px}
.efl{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:block}
.efv{font-size:12px;color:var(--text);display:block}
.exp-acts{display:flex;align-items:center;gap:7px;padding-top:8px;border-top:1px solid var(--border);flex-wrap:wrap}
.enote{font-size:11px;color:var(--text2);padding:6px 10px;background:var(--bg);border-radius:var(--r);border-left:3px solid var(--upcoming);margin-bottom:10px;font-style:italic}

/* PILLS TAGS */
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-family:var(--mono);font-size:10px;font-weight:500;white-space:nowrap}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.po{background:var(--open-bg);color:var(--open)}.po .dot{box-shadow:0 0 5px currentColor}
.pc{background:var(--closed-bg);color:var(--closed)}
.pu{background:var(--upcoming-bg);color:var(--upcoming)}
.pk{background:var(--check-bg);color:var(--check)}
.elig{font-family:var(--mono);font-size:11px;font-weight:600;padding:2px 7px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;transition:filter .1s}
.elig:hover{filter:brightness(.88)}
.ey{background:var(--yes-bg);color:var(--yes)}.en{background:var(--no-bg);color:var(--no)}.em{background:var(--maybe-bg);color:var(--maybe)}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.ta{background:#e0e7ff;color:#3730a3}[data-theme=dark] .ta{background:#1e1b4b;color:#a5b4fc}
.tb{background:#d1fae5;color:#065f46}[data-theme=dark] .tb{background:#022c22;color:#6ee7b7}
.tr{background:#fce7f3;color:#9d174d}[data-theme=dark] .tr{background:#4a0030;color:#f9a8d4}
.tp{background:#fee2e2;color:#991b1b}[data-theme=dark] .tp{background:#450a0a;color:#fca5a5}
.td{background:#fef3c7;color:#92400e}[data-theme=dark] .td{background:#431407;color:#fcd34d}
.tch{background:#ede9fe;color:#5b21b6}[data-theme=dark] .tch{background:#2e1065;color:#c4b5fd}
.tps{background:#d1fae5;color:#064e3b}[data-theme=dark] .tps{background:#064e3b;color:#6ee7b7}
.to{background:#f3f4f6;color:#374151}[data-theme=dark] .to{background:#1f2937;color:#9ca3af}
.te{background:#fdf4ff;color:#7e22ce}[data-theme=dark] .te{background:#3b0764;color:#e9d5ff}
.cb{width:15px;height:15px;cursor:pointer;accent-color:var(--yes)}
.ib{height:24px;padding:0 9px;font-family:var(--mono);font-size:10px;border:1px solid var(--border);color:var(--muted);background:var(--surface);cursor:pointer;border-radius:var(--r);transition:all .1s;white-space:nowrap}
.ib:hover{border-color:var(--accent);color:var(--accent)}
.ib.dl:hover{border-color:var(--closed);color:var(--closed)}
.ib.act{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

/* PANEL */
.pb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;backdrop-filter:blur(2px)}
.pb.open{display:block}
.pn{position:fixed;top:0;right:-560px;height:100vh;width:530px;background:var(--surface);border-left:1px solid var(--border);z-index:400;transition:right .22s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
.pn.open{right:0}
.pn-head{padding:20px 24px 0;flex-shrink:0;position:relative}
.pt{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.pname{font-size:16px;font-weight:600;margin-bottom:10px;line-height:1.35;padding-right:32px}
.pcl{position:absolute;top:14px;right:18px;background:none;border:1px solid var(--border);color:var(--muted);font-size:15px;cursor:pointer;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:var(--r)}
.pcl:hover{color:var(--text);border-color:var(--border2)}
.tab-bar{display:flex;border-bottom:2px solid var(--border);margin:12px 24px 0;flex-shrink:0}
.tab-btn{height:34px;padding:0 14px;font-family:var(--mono);font-size:11px;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--muted);cursor:pointer;transition:all .12s;white-space:nowrap}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-body{flex:1;overflow-y:auto}
.tab-content{display:none;padding:18px 24px}
.tab-content.active{display:block}
.pf{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:7px;flex-shrink:0;background:var(--surface)}

/* PANEL CONTENT */
.sh{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:16px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.sh:first-child{margin-top:0}
.ptbl{width:100%;border-collapse:collapse;font-size:12px}
.ptbl th{text-align:left;padding:5px 9px;background:var(--bg2);font-weight:600;font-size:11px;border:1px solid var(--border)}
.ptbl td{padding:5px 9px;border:1px solid var(--border);vertical-align:top}
.sb{margin-bottom:11px}
.sb h4{font-size:12px;font-weight:600;margin-bottom:3px}
.sb ul{padding-left:15px}
.sb ul li{font-size:12px;color:var(--text2);margin-bottom:2px}
.sl-link{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid var(--accent);color:var(--accent);text-decoration:none;font-size:11px;font-family:var(--mono);border-radius:var(--r);margin-bottom:12px}
.sl-link:hover{background:var(--accent);color:#fff}
.ibox{padding:8px 10px;background:var(--upcoming-bg);color:var(--upcoming);font-size:11px;border-radius:var(--r);margin-bottom:10px}

/* EDIT COMPONENTS */
.fg{display:flex;flex-direction:column;gap:4px}.fg.full{grid-column:1/-1}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:14px}
label,.lbl{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:3px}
.fg input,.fg select,.fg textarea,.ei{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:7px 9px;border-radius:var(--r);outline:none;transition:border-color .12s;resize:vertical;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus,.ei:focus{border-color:var(--accent)}
.row-edit{display:flex;gap:5px;align-items:center;margin-bottom:5px}
.row-edit input{flex:1;height:28px;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px;padding:0 7px;border-radius:var(--r);outline:none}
.row-edit input:focus{border-color:var(--accent)}
.xbtn{width:22px;height:22px;background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;border-radius:var(--r);font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.xbtn:hover{border-color:var(--closed);color:var(--closed)}
.add-btn{width:100%;height:26px;background:none;border:1px dashed var(--border2);color:var(--muted);font-family:var(--mono);font-size:10px;cursor:pointer;border-radius:var(--r);margin-bottom:10px;transition:all .1s}
.add-btn:hover{border-color:var(--accent);color:var(--accent)}
.sec-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:8px}
.sec-head{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.sec-head input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px;font-weight:600;padding:5px 8px;border-radius:var(--r);outline:none;height:28px}
.sec-head input:focus{border-color:var(--accent)}

/* MOBILE */
@media(max-width:767px){
  .topbar{padding:9px 12px}
  .topbar-r .ts,.topbar-r .user-chip{display:none}
  .controls{padding:8px 12px}
  input[type=text]{min-width:120px}
  .stats{display:grid;grid-template-columns:repeat(3,1fr)}
  .stat{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:8px}
  .stat:nth-child(3),.stat:nth-child(6){border-right:none}
  .sn{font-size:15px}
  .tw{display:none}
  .card-list{display:flex;flex-direction:column;gap:1px}
  .card{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 14px;cursor:pointer}
  .card.app-card{background:var(--yes-bg)}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
  .card-name{font-size:13px;font-weight:500;line-height:1.3;flex:1}
  .card-meta{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
  .card-dl{font-family:var(--mono);font-size:10px;color:var(--muted)}
  .card-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
  .card-detail.open{display:block}
  .card-dg{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;margin-bottom:10px}
  .cdl{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:block}
  .cdv{font-size:11px;color:var(--text);display:block}
  .card-acts{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .pn{width:100%;right:-100%}
}
@media(min-width:768px){.card-list{display:none}}

/* MISC */
.empty{text-align:center;padding:60px;font-family:var(--mono);font-size:12px;color:var(--muted)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
.loading{display:flex;align-items:center;justify-content:center;height:200px;font-family:var(--mono);font-size:12px;color:var(--muted);gap:10px}
.spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen" class="show">
  <div class="auth-box">
    <div class="auth-logo">GOVT JOB <span>TRACKER</span></div>
    <div class="auth-sub">Sign in to access your personal tracker</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showAuthTab('login',this)">Sign In</button>
      <button class="auth-tab" onclick="showAuthTab('signup',this)">Sign Up</button>
      <button class="auth-tab" onclick="showAuthTab('reset',this)">Reset Password</button>
    </div>
    <!-- Login -->
    <div class="auth-form show" id="af-login">
      <div class="af"><label>Email</label><input type="email" id="li-email" placeholder="you@example.com"></div>
      <div class="af"><label>Password</label><input type="password" id="li-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="auth-err" id="li-err"></div>
      <button class="btn primary" onclick="doLogin()">Sign In</button>
    </div>
    <!-- Signup -->
    <div class="auth-form" id="af-signup">
      <div class="af"><label>Your Name</label><input type="text" id="su-name" placeholder="Full name"></div>
      <div class="af"><label>Email</label><input type="email" id="su-email" placeholder="you@example.com"></div>
      <div class="af"><label>Password (min 6 chars)</label><input type="password" id="su-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doSignup()"></div>
      <div class="auth-err" id="su-err"></div>
      <button class="btn primary" onclick="doSignup()">Create Account</button>
    </div>
    <!-- Reset -->
    <div class="auth-form" id="af-reset">
      <div class="af"><label>Email</label><input type="email" id="re-email" placeholder="you@example.com"></div>
      <div class="auth-err" id="re-err"></div>
      <div class="auth-ok" id="re-ok"></div>
      <button class="btn primary" onclick="doReset()">Send Reset Email</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="topbar">
    <div class="logo">GOVT JOB <span>TRACKER</span></div>
    <div class="topbar-r">
      <span class="ts" id="ts"></span>
      <div class="user-chip"><span class="sdot" id="sdot"></span><span id="userEmail"></span></div>
      <button class="btn ghost" onclick="showProfile()">👤 Profile</button>
      <button class="btn ghost" id="thbtn" onclick="toggleTheme()">☀</button>
      <button class="btn" onclick="expCSV()">↓ CSV</button>
      <button class="btn primary" onclick="openAdd()">+ Add</button>
      <button class="btn ghost" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="controls">

function showAuthTab(tab,btn){
  document.querySelectorAll('.auth-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f=>f.classList.remove('show'));
  btn.classList.add('active');
  document.getElementById('af-'+tab).classList.add('show');
}
function authErr(id,msg){const e=document.getElementById(id);e.textContent=msg;e.classList.add('show');}
function authOk(id,msg){const e=document.getElementById(id);e.textContent=msg;e.classList.add('show');}
function clearAuthErr(){document.querySelectorAll('.auth-err,.auth-ok').forEach(e=>{e.classList.remove('show');e.textContent='';});}

async function doLogin(){
  clearAuthErr();
  const email=document.getElementById('li-email').value.trim();
  const pass=document.getElementById('li-pass').value;
  if(!email||!pass){authErr('li-err','Please enter email and password.');return;}
  try{await auth.signInWithEmailAndPassword(email,pass);}
  catch(e){authErr('li-err',friendlyErr(e.code));}
}
async function doSignup(){
  clearAuthErr();
  const name=document.getElementById('su-name').value.trim();
  const email=document.getElementById('su-email').value.trim();
  const pass=document.getElementById('su-pass').value;
  if(!name||!email||!pass){authErr('su-err','Please fill all fields.');return;}
  if(pass.length<6){authErr('su-err','Password must be at least 6 characters.');return;}
  try{
    const cred=await auth.createUserWithEmailAndPassword(email,pass);
    await cred.user.updateProfile({displayName:name});
  }catch(e){authErr('su-err',friendlyErr(e.code));}
}
async function doReset(){
  clearAuthErr();
  const email=document.getElementById('re-email').value.trim();
  if(!email){authErr('re-err','Please enter your email.');return;}
  try{await auth.sendPasswordResetEmail(email);authOk('re-ok','Reset email sent! Check your inbox.');}
  catch(e){authErr('re-err',friendlyErr(e.code));}
}
async function doLogout(){await auth.signOut();}

    'auth/too-many-requests':'Too many attempts. Please try again later.',
    'auth/network-request-failed':'Network error. Check your connection.',
    'auth/invalid-credential':'Invalid email or password.'
  };
  return m[code]||'Something went wrong. Please try again.';
}

auth.onAuthStateChanged(async user=>{

// FIRESTORE LOAD / SAVE
// ══════════════════════════════════════════════
function docRef(){return db.collection('users').doc(currentUser.uid);}

async function loadData(){
  setSyncState('saving');
  try{
    const snap=await docRef().get();
    if(snap.exists){
      const d=snap.data();
      jobs=d.jobs||getDefaultJobs();
      applied=d.applied||{};
      profile=d.profile||{...DEFAULT_PROFILE};
    } else {
      jobs=getDefaultJobs();applied={};profile={...DEFAULT_PROFILE};
      await saveNow();
    }
    jobs=jobs.map(j=>({...j,status:autoStatus(j)}));
    setSyncState('ok');
    setTs();
  }catch(e){setSyncState('err');console.error(e);}
}

function scheduleSave(){
  clearTimeout(saveTimer);
  setSyncState('saving');
  saveTimer=setTimeout(saveNow,1200);
}

async function saveNow(){
  if(!currentUser)return;
  try{
    await docRef().set({jobs,applied,profile,savedAt:Date.now()});
    setSyncState('ok');setTs();
  }catch(e){setSyncState('err');console.error(e);}
}

function setSyncState(s){
  const d=document.getElementById('sdot');
  if(!d)return;
  d.className='sdot'+(s==='saving'?' saving':s==='err'?' err':'');
}
function setTs(){
  const d=new Date();
  const el=document.getElementById('ts');
  if(el)el.textContent='Saved '+d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}

// ══════════════════════════════════════════════
// AUTO STATUS
// ══════════════════════════════════════════════
function autoStatus(j){
  if(!j.deadlineDate)return j.status;
  const dl=new Date(j.deadlineDate);
  const now=new Date();now.setHours(0,0,0,0);
  const diff=(dl-now)/(1000*60*60*24);
  if(diff<0)return'closed';
  if(diff<=30)return'open';
  return j.status==='closed'?'upcoming':j.status;
}

function fmtDl(j){
  if(!j.deadlineDate&&!j.deadline)return'—';
  if(j.deadlineDate){
    const dl=new Date(j.deadlineDate);
    const now=new Date();now.setHours(0,0,0,0);
    const diff=Math.round((dl-now)/(1000*60*60*24));
    const fmt=dl.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
    if(diff<0)return`<span style="font-family:var(--mono);font-size:11px;color:var(--closed)">${fmt}</span>`;
    if(diff===0)return`<span style="font-family:var(--mono);font-size:11px;color:var(--closed);font-weight:600">TODAY ⚡</span>`;
    if(diff<=7)return`<span style="font-family:var(--mono);font-size:11px;color:var(--closed);font-weight:600">${fmt} 🚨</span>`;
    if(diff<=30)return`<span style="font-family:var(--mono);font-size:11px;color:var(--upcoming)">${fmt}</span>`;
    return`<span style="font-family:var(--mono);font-size:11px;color:var(--text2)">${fmt}</span>`;
  }
  return`<span style="font-family:var(--mono);font-size:11px;color:var(--muted)">${j.deadline}</span>`;
}

function pill(s){const m={open:['po','OPEN'],closed:['pc','CLOSED'],upcoming:['pu','UPCOMING'],check:['pk','CHECK']};const[c,l]=m[s]||m.check;return`<span class="pill ${c}"><span class="dot"></span>${l}</span>`;}
function eligBadge(e,id,clickable=false){
  const cls=e==='yes'?'ey':e==='no'?'en':'em';
  const lbl=e==='yes'?'✓ YES':e==='no'?'✗ NO':'≈ MAYBE';
  const oc=clickable?`onclick="event.stopPropagation();od(${id},'e')" title="View eligibility"`:'';
  return`<span class="elig ${cls}" ${oc}>${lbl}</span>`;
}
function tg(t){const k=(t||'').toLowerCase().replace(/\s/g,'');const m={administration:'ta',banking:'tb',railway:'tr',police:'tp',defence:'td',teaching:'tch',psu:'tps',education:'te',other:'to'};return`<span class="tag ${m[k]||'to'}">${t||'Other'}</span>`;}

function gf(){
  const q=document.getElementById('q').value.toLowerCase();
  const sf=document.getElementById('fS').value;
  const tf=document.getElementById('fT').value;
  const af=document.getElementById('fA').value;
  const ef=document.getElementById('fE').value;
  const apf=document.getElementById('fAp').checked;
  return jobs.filter(j=>{
    if(q&&!`${j.name} ${j.agency} ${j.posts||''} ${j.tag||''}`.toLowerCase().includes(q))return false;
    if(sf&&j.status!==sf)return false;
    if(tf&&j.tag!==tf)return false;
    if(af&&j.agency!==af)return false;
    if(ef&&j.eligible!==ef)return false;
    if(apf&&!applied[j.id])return false;
    return true;
  });
}

function render(){
  const f=gf().slice().sort((a,b)=>{
    let av=a[sc],bv=b[sc];
    if(sc==='deadlineDate'){av=a.deadlineDate||'9999';bv=b.deadlineDate||'9999';}
    else if(['rank'].includes(sc)){av=parseFloat(av)||9999;bv=parseFloat(bv)||9999;}
    return av<bv?-sd:av>bv?sd:0;
  });

  // Update tag + agency dropdowns dynamically per user's jobs
  const tSel=document.getElementById('fT');const tCurr=tSel.value;
  const userTags=[...new Set(jobs.map(j=>j.tag).filter(Boolean))].sort();
  tSel.innerHTML='<option value="">All Tags</option>'+userTags.map(t=>`<option${t===tCurr?' selected':''}>${t}</option>`).join('');

  const aSel=document.getElementById('fA');const aCurr=aSel.value;
  const userAgencies=[...new Set(jobs.map(j=>j.agency).filter(Boolean))].sort();
  aSel.innerHTML='<option value="">All Agencies</option>'+userAgencies.map(a=>`<option${a===aCurr?' selected':''}>${a}</option>`).join('');

  document.getElementById('sT').textContent=f.length;
  document.getElementById('sO').textContent=f.filter(j=>j.status==='open').length;
  document.getElementById('sU').textContent=f.filter(j=>j.status==='upcoming').length;
  document.getElementById('sCl').textContent=f.filter(j=>j.status==='closed'||j.status==='check').length;
  document.getElementById('sEl').textContent=f.filter(j=>j.eligible==='yes').length;
  document.getElementById('sAp').textContent=Object.values(applied).filter(Boolean).length;

  const tb=document.getElementById('tbody');
  const em=document.getElementById('empty');
  if(!f.length){tb.innerHTML='';em.style.display='block';renderCards([]);return;}
  em.style.display='none';

  tb.innerHTML=f.map(j=>{
    const isExp=expandedId===j.id;
    const isApp=applied[j.id];
    const main=`<tr class="main-row${isApp?' app-row':''}${isExp?' expanded':''}" onclick="toggleRow(${j.id})">
      <td class="xarr"><span class="arr">▶</span></td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center">${j.rank}</td>
      <td style="font-weight:500;font-size:12px">${j.name}</td>
      <td style="color:var(--text2);font-size:11px">${j.agency}</td>
      <td>${tg(j.tag)}</td>
      <td>${fmtDl(j)}</td>
      <td>${pill(j.status)}</td>
      <td>${eligBadge(j.eligible,j.id,true)}</td>
      <td style="text-align:center"><input type="checkbox" class="cb" ${isApp?'checked':''} onchange="tgA(${j.id},this)" onclick="event.stopPropagation()"></td>
    </tr>`;
    const exp=`<tr class="exp-row${isExp?' open':''}">
      <td colspan="9" style="padding:0">
        <div class="exp-inner">
          ${j.notes?`<div class="enote">${j.notes}</div>`:''}
          <div class="exp-grid">
            <div><span class="efl">Vacancies</span><span class="efv">${j.vacancies||'—'}</span></div>
            <div><span class="efl">Age Limit</span><span class="efv">${j.age||'—'}</span></div>
            <div><span class="efl">Fee</span><span class="efv">${j.fee||'—'}</span></div>
            <div><span class="efl">Pay / Salary</span><span class="efv">${j.pay||'—'}</span></div>
            ${j.website?`<div><span class="efl">Website</span><span class="efv"><a href="${j.website}" target="_blank" onclick="event.stopPropagation()">${j.website.replace('https://','').split('/')[0]}</a></span></div>`:''}
            <div style="grid-column:1/-1"><span class="efl">Posts</span><span class="efv">${j.posts||'—'}</span></div>
          </div>
          <div class="exp-acts">
            <button class="ib act" onclick="event.stopPropagation();od(${j.id},'e')">Eligibility</button>
            <button class="ib" onclick="event.stopPropagation();od(${j.id},'p')">Pattern</button>
            <button class="ib" onclick="event.stopPropagation();od(${j.id},'s')">Syllabus</button>
            <span style="flex:1"></span>
            <button class="ib" onclick="event.stopPropagation();oe(${j.id})">Edit</button>
            <button class="ib dl" onclick="event.stopPropagation();delJob(${j.id})">✕ Delete</button>
          </div>
        </div>
      </td>
    </tr>`;
    return main+exp;
  }).join('');
  renderCards(f);
}

function tgA(id,el){
  applied[id]=el.checked;

  const c=el.closest('.card');if(c){c.classList.toggle('app-card',el.checked);}
  document.getElementById('sAp').textContent=Object.values(applied).filter(Boolean).length;

function srt(c){
  if(sc===c)sd*=-1;else{sc=c;sd=1;}
  document.querySelectorAll('thead th').forEach(t=>{t.classList.remove('asc','desc');});
  const cols=['','rank','name','agency','','deadlineDate','status','eligible',''];
  const i=cols.indexOf(c);
  if(i>=0){const ths=document.querySelectorAll('thead th');if(ths[i])ths[i].classList.add(sd===1?'asc':'desc');}
  render();
}

function openPanel(head,tabs,contents,footer){

  } else {tb.style.display='none';}
  tby.innerHTML=contents.map((c,i)=>`<div class="tab-content${i===0?' active':''}" id="tc${i}">${c}</div>`).join('');

    `<button class="btn" onclick="od(${id},'s')">Cancel</button><button class="btn primary" onclick="saveSyllabus(${id})">Save</button>`
  );
}
function sylSection(sec,i){
  const items=(sec.items||[]);
  return`<div class="sec-block" id="sl-sec-${i}">
    <div class="sec-head">
      <input value="${(sec.head||'').replace(/"/g,'&quot;')}" placeholder="Section heading">
      <button class="xbtn" onclick="this.closest('.sec-block').remove()">✕</button>
    </div>
    <div class="sl-items">${items.map((item,j)=>sylItem(item,i,j)).join('')}</div>
    <button class="add-btn" onclick="addSylItem(this)" style="margin-bottom:0">+ Add Item</button>
  </div>`;
}
function sylItem(val,si,ii){
  return`<div class="row-edit" style="margin-bottom:4px"><input value="${val.replace(/"/g,'&quot;')}" placeholder="Syllabus item"><button class="xbtn" onclick="this.parentElement.remove()">✕</button></div>`;
}
function addSylSection(){
  const c=document.getElementById('sl-secs');
  const i=c.children.length;
  c.insertAdjacentHTML('beforeend',sylSection({head:'',items:['']},i));
}
function addSylItem(btn){
  const list=btn.previousElementSibling;
  list.insertAdjacentHTML('beforeend',`<div class="row-edit" style="margin-bottom:4px"><input placeholder="Syllabus item"><button class="xbtn" onclick="this.parentElement.remove()">✕</button></div>`);
}
function saveSyllabus(id){
  const j=jobs.find(x=>x.id===id);if(!j)return;
  const link=document.getElementById('sl-link').value.trim();
  const secEls=document.getElementById('sl-secs').children;
  const curated=[...secEls].map(s=>{
    const head=s.querySelector('.sec-head input').value.trim();
    const items=[...s.querySelectorAll('.sl-items input')].map(i=>i.value.trim()).filter(Boolean);
    return{head,items};
  }).filter(s=>s.head);
  j.syllabus={link,curated};scheduleSave();od(id,'s');
}

// ══════════════════════════════════════════════
// ADD / EDIT JOB (basic info form)
// ══════════════════════════════════════════════
function fH(j){
  const v=k=>j?(j[k]||''):'';
  const sel=(k,opts)=>opts.map(x=>`<option value="${x}"${v(k)===x?' selected':''}>${x}</option>`).join('');
  const html=`<div class="fgrid">
    <div class="fg"><label>Rank</label><input id="fr" type="number" value="${v('rank')}"></div>
    <div class="fg"><label>Status</label><select id="fst">${sel('status',['open','upcoming','closed','check'])}</select></div>
    <div class="fg full"><label>Exam / Job Name *</label><input id="fn" type="text" value="${v('name')}"></div>
    <div class="fg"><label>Conducting Agency *</label><input id="fa" type="text" value="${v('agency')}"></div>
    <div class="fg"><label>Tag</label><select id="ftg">${sel('tag',['Administration','Banking','Railway','Police','Defence','Teaching','PSU','Education','Other'])}</select></div>
    <div class="fg"><label>Vacancies</label><input id="fv" type="text" value="${v('vacancies')}"></div>
    <div class="fg"><label>Eligible?</label><select id="fe">${sel('eligible',['yes','no','maybe'])}</select></div>
    <div class="fg full"><label>Post Names</label><input id="fp" type="text" value="${v('posts')}"></div>
    <div class="fg"><label>Deadline Label</label><input id="fd" type="text" value="${v('deadline')}" placeholder="e.g. 15 March 2026"></div>
    <div class="fg"><label>Deadline Date (ISO)</label><input id="fdd" type="date" value="${v('deadlineDate')}"></div>
    <div class="fg full"><label>Official Website</label><input id="fw" type="text" value="${v('website')}" placeholder="https://..."></div>
    <div class="fg"><label>Age Limit</label><input id="fag" type="text" value="${v('age')}"></div>
    <div class="fg"><label>Fee</label><input id="ff" type="text" value="${v('fee')}"></div>
    <div class="fg full"><label>Pay / Salary</label><input id="fpy" type="text" value="${v('pay')}"></div>
    <div class="fg full"><label>Notes / Warnings</label><textarea id="fno" rows="3">${v('notes')}</textarea></div>
  </div>`;
  return html;
}

let editId=null;
function openAdd(){
  editId=null;
  openPanel({label:'New Job',name:'Add New Exam'},null,[fH(null)],
    `<button class="btn" onclick="closeP()">Cancel</button><button class="btn primary" onclick="svJ()">Save</button>`);
}
function oe(id){
  editId=id;
  const j=jobs.find(x=>x.id===id);
  openPanel({label:'Edit Job',name:j?j.name:''},null,[fH(j)],
    `<button class="btn" onclick="closeP()">Cancel</button><button class="btn primary" onclick="svJ()">Save</button>`);
}
function svJ(){
  const n=document.getElementById('fn').value.trim();if(!n){alert('Job name required.');return;}
  const d={
    rank:parseInt(document.getElementById('fr').value)||99,name:n,
    agency:document.getElementById('fa').value.trim(),tag:document.getElementById('ftg').value,
    vacancies:document.getElementById('fv').value.trim(),eligible:document.getElementById('fe').value,
    posts:document.getElementById('fp').value.trim(),deadline:document.getElementById('fd').value.trim(),
    deadlineDate:document.getElementById('fdd').value.trim()||null,
    status:document.getElementById('fst').value,website:document.getElementById('fw').value.trim(),
    age:document.getElementById('fag').value.trim(),fee:document.getElementById('ff').value.trim(),
    pay:document.getElementById('fpy').value.trim(),notes:document.getElementById('fno').value.trim()
  };
  d.status=autoStatus(d);
  if(editId!==null){
    const i=jobs.findIndex(j=>j.id===editId);
    if(i!==-1)jobs[i]={...jobs[i],...d};
  } else {
    d.id=Date.now();
    d.pattern={rows:[["Stage","Type","Marks"],["—","—","—"]]};
    d.syllabus={link:'',curated:[{head:'Add syllabus',items:['Edit this job to update syllabus']}]};
    d.eligibilityInfo={profile:'',conditions:[],advantages:[],note:''};
    jobs.push(d);
  }
  scheduleSave();closeP();render();
}
function delJob(id){
  if(!confirm('Delete this job?'))return;
  jobs=jobs.filter(j=>j.id!==id);
  delete applied[id];
  if(expandedId===id)expandedId=null;
  scheduleSave();render();
}
function clrF(){
  document.getElementById('q').value='';
  ['fS','fT','fA','fE'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('fAp').checked=false;render();
}

    <div class="fg"><label>10th Board</label><input id="pf-tenth" type="text" value="${p.tenth||''}"></div>

function saveProfile(){
  profile={
    name:document.getElementById('pf-name').value.trim(),
    tenth:document.getElementById('pf-tenth').value.trim(),
    twelfth:document.getElementById('pf-twelfth').value.trim(),
    graduation:document.getElementById('pf-grad').value.trim(),
    gradPercent:document.getElementById('pf-gradp').value.trim(),
    domicile:document.getElementById('pf-dom').value.trim(),
    category:document.getElementById('pf-cat').value.trim(),
    age:document.getElementById('pf-age').value.trim(),
    gender:document.getElementById('pf-gen').value.trim(),
    health:document.getElementById('pf-health').value.trim(),
    notes:document.getElementById('pf-notes').value.trim()
  };
  scheduleSave();showProfile();
}

// THEME / CSV / KEYBOARD
// ══════════════════════════════════════════════
function toggleTheme(){
  const dk=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',dk?'light':'dark');
  document.getElementById('thbtn').textContent=dk?'☀':'☾';
  localStorage.setItem('gjtTh',dk?'light':'dark');
}
function expCSV(){
  const c=['rank','name','agency','tag','vacancies','posts','deadline','deadlineDate','status','website','eligible','age','fee','pay','notes'];
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent([c.join(','),...jobs.map(j=>c.map(k=>`"${(j[k]||'').toString().replace(/"/g,'""')}"`).join(','))].join('\n'));
  a.download='govt_jobs_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeP();
  if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();openAdd();}
});
const st=localStorage.getItem('gjtTh')||'light';
document.documentElement.setAttribute('data-theme',st);
document.getElementById('thbtn').textContent=st==='dark'?'☾':'☀';
</script>
